    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function buildHtml() {
    const t1 = state.c1.valorTotal;
    const t2 = state.c2.valorTotal;
    const suma = (typeof t1 === 'number' ? t1 : parseNum(t1)) + (typeof t2 === 'number' ? t2 : parseNum(t2));
    return (
      '<div class="p-doc__chunk" data-chunk="intro">' +
      '<div class="p-doc__logoBox"><img class="p-doc__logo" crossorigin="anonymous" src="' + escapeHtml(LOGO_URL) + '" alt="DDG" /></div>' +
      '<p class="p-doc__kicker">Documento de referencia comercial</p>' +
      '<h1 class="p-doc__title">Presupuesto de capacitación</h1>' +
      '<p class="p-doc__sub">Vista para evaluación de propuesta — no constituye factura</p>' +
      '<div class="p-doc__otecline"><span>Organismo</span><span>' + escapeHtml(state.otecName) + '</span></div>' +
      '<div class="p-doc__otecline"><span>RUT</span><span>' + escapeHtml(state.otecRut) + '</span></div>' +
      '<div class="p-doc__otecline"><span>Región</span><span>' + escapeHtml(state.otecRegion) + '</span></div>' +
      '<div class="p-doc__otecline"><span>Correo</span><span>' + escapeHtml(state.otecEmail) + '</span></div>' +
      '</div>' +

      buildCursoSection({
        index: 1,
        curso: state.c1,
        valorTotal: typeof t1 === 'number' ? t1 : parseNum(t1),
        metaRows: [
          ['Modalidad', state.c1.modalidad],
          ['Horas', state.c1.horas],
          ['Módulos', state.c1.modulos],
          ['Mínimo de participantes', String(state.c1.minParticipantes)],
          ['Relator/a', state.c1.relator],
          ['Formas de pago', state.c1.formasPago],
          ['Valor total', fmt(typeof t1 === 'number' ? t1 : parseNum(t1))],
          ['Valor por participante', fmt(typeof state.c1.valorParticipante === 'number' ? state.c1.valorParticipante : parseNum(state.c1.valorParticipante))],
        ],
      }) +
      buildCursoSection({
        index: 2,
        curso: state.c2,
        valorTotal: typeof t2 === 'number' ? t2 : parseNum(t2),
        metaRows: [
          ['Modalidad', state.c2.modalidad],
          ['Horas', state.c2.horas],
          ['Módulos', state.c2.modulos],
          ['Jornadas', state.c2.jornadas],
          ['Relator/a', state.c2.relator],
          ['Valor total', fmt(typeof t2 === 'number' ? t2 : parseNum(t2))],
        ],
      }) +

      '<div class="p-doc__chunk" data-chunk="cierre">' +
      '<div class="p-doc__resumen"><div class="l">Inversión total (cursos indicados)</div><div class="v">' + fmt(suma) + '</div></div>' +
      '<p class="p-doc__legal"><strong>Condiciones comerciales</strong><br/>' + nl2br(escapeHtml(state.condiciones)) + '</p>' +
      '</div>'
    );
  }
  function buildCursoSection(cfg) {
    const c = cfg.curso;
    return (
      '<div class="p-doc__section p-doc__chunk" data-chunk="curso-' + cfg.index + '">' +
      '<h2 class="p-doc__h2">' + cfg.index + ' · ' + escapeHtml(c.name) + '</h2>' +
      textCard('Descripción general', c.descripcion) +
      '<div class="p-doc__metaGrid">' + cfg.metaRows.map(function (pair) { return metaRow(pair[0], pair[1]); }).join('') + '</div>' +
      '<p style="margin:3mm 0 1.5mm;font-size:8.5pt;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.05em">Desglose / glosa</p>' +
      '<table class="p-doc__table p-doc__gloss"><tbody>' +
      gRow(c.g1l, c.g1, c.g1d) + gRow(c.g2l, c.g2, c.g2d) + gRow(c.g3l, c.g3, c.g3d) +
      '</tbody></table>' +
      subtot('Subtotal módulo ' + cfg.index, cfg.valorTotal) +
      '</div>'
    );
  }
  function metaRow(l, v) {
    return '<div class="p-doc__metaRow"><div class="p-doc__metaK">' + escapeHtml(l) + '</div><div class="p-doc__metaV">' + escapeHtml(String(v != null ? v : '')) + '</div></div>';
  }
  function textCard(label, text) {
    return '<div class="p-doc__textCard"><p class="p-doc__textCardLabel">' + escapeHtml(label) + '</p><p class="p-doc__textCardVal">' + nl2br(escapeHtml(String(text != null ? text : ''))) + '</p></div>';
  }
  function gRow(label, n, detalle) {
    const v = typeof n === 'number' ? n : parseNum(n);
    return '<tr><td>' + escapeHtml(label) + '</td><td class="num">' + fmt(v) + '</td></tr>' +
      '<tr class="p-doc__glossNote"><td colspan="2">' + escapeHtml(String(detalle != null ? detalle : '')) + '</td></tr>';
  }
  function subtot(t, n) {
    return '<div class="p-doc__totbar"><div>' + escapeHtml(t) + '</div><div>' + fmt(n) + '</div></div>';
  }
  function nl2br(s) { return s.replace(/\n/g, '<br/>'); }

  function applySmartPageBreaks() {
    const chunks = Array.from(docEl.querySelectorAll('[data-chunk]'));
    if (!chunks.length) return;

    chunks.forEach(function (chunk) { chunk.classList.remove('p-doc__break-before'); });

    const pxPerMm = docEl.getBoundingClientRect().width / 210;
    const usablePageMm = 297 - 14 - 18;
    const pageLimitPx = pxPerMm * usablePageMm;

    let acc = 0;
    chunks.forEach(function (chunk) {
      const h = chunk.getBoundingClientRect().height;
      if (acc > 0 && (acc + h) > pageLimitPx) {
        chunk.classList.add('p-doc__break-before');
        acc = h;
      } else {
        acc += h;
      }
    });
  }

  function render() {
    docEl.innerHTML = buildHtml();
    applySmartPageBreaks();
    document.getElementById('hint-total').textContent = fmt(computeSuma());
  }

  function computeSuma() {
    const a = typeof state.c1.valorTotal === 'number' ? state.c1.valorTotal : parseNum(state.c1.valorTotal);
    const b = typeof state.c2.valorTotal === 'number' ? state.c2.valorTotal : parseNum(state.c2.valorTotal);
    return a + b;
  }

  function syncFormFromState() {
    document.querySelectorAll('[data-k]').forEach(function (el) {
      const k = el.getAttribute('data-k');
      const v = get(state, k);
      if (el.classList.contains('num-inp') && !/\.g[123]l$/.test(k)) {
        if (v != null && v !== '') { el.value = typeof v === 'number' ? String(v) : String(v); } else { el.value = ''; }
      } else {
        el.value = v != null ? String(v) : '';
      }
    });
  }

  function applyInputToState(el) {
    const k = el.getAttribute('data-k');
    if (!k) return;
    const raw = el.value;
    if (!el.classList.contains('num-inp') || /\.g[123]l$/.test(k)) {
      set(state, k, raw);
      return;
    }
    if (k.indexOf('minParticipantes') !== -1) {
      set(state, k, parseInt(String(raw).replace(/\D/g, ''), 10) || 0);
      return;
    }
    set(state, k, parseNum(raw) || 0);
  }

  function bindForm() {
    document.getElementById('form-accordions').addEventListener('input', function (e) {
      const el = e.target;
      if (!el || !el.getAttribute('data-k')) return;
      applyInputToState(el);
      render();
    });
    document.getElementById('form-accordions').addEventListener('change', function (e) {
      const el = e.target;
      if (el && el.getAttribute('data-k')) { applyInputToState(el); render(); }
    });
  }

  function fitPreview() {
    const main = document.querySelector('main');
    if (!main || !scaleWrap) return;
    const pad = 40;
    const w = main.clientWidth - pad;
    const docW = docEl.getBoundingClientRect().width;
    const s = Math.min(1, w / docW) * 0.98;
    scaleWrap.style.transform = 'scale(' + s + ')';
    scaleWrap.style.transformOrigin = 'top center';
    const h = docEl.getBoundingClientRect().height * s;
    scaleWrap.parentElement.style.minHeight = Math.max(h + 32, 400) + 'px';
  }

  const btn = document.getElementById('btn-pdf');
  const btnLabel = document.getElementById('btn-pdf-label');
  const labelIdle = 'Descargar PDF';

  btn.addEventListener('click', function () {
    if (btn.disabled) return;
    const prevT = scaleWrap.style.transform;
    const prevO = scaleWrap.style.transformOrigin;
    scaleWrap.style.transform = 'none';
    scaleWrap.style.transformOrigin = 'top center';
    btn.disabled = true;
    btnLabel.textContent = 'Cargando…';
    var el = document.getElementById('doc-print');
    var opt = {
      margin: 8,
      filename: 'presupuesto-ddg-del-valle.pdf',
      image: { type: 'jpeg', quality: 0.96 },
      html2canvas: { scale: 2, useCORS: true, letterRendering: true, logging: false, backgroundColor: '#ffffff' },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
      pagebreak: { mode: ['css', 'legacy', 'avoid-all'] },
    };
    function finish() {
      scaleWrap.style.transform = prevT;
      scaleWrap.style.transformOrigin = prevO;
      fitPreview();
      btn.disabled = false;
      btnLabel.textContent = labelIdle;
    }
    requestAnimationFrame(function () {
      setTimeout(function () {
        var chain = window.html2pdf().set(opt).from(el).save();
        Promise.resolve(chain).then(finish).catch(function (e) {
          console.error(e);
          finish();
          alert('Error al generar el PDF. Si el logo no se ve en el archivo, puede ser CORS: sube el logo al mismo dominio o desactiva bloqueo de contenido mixto.');
        });
      }, 50);
    });
  });

  /* Init */
  render();
  syncFormFromState();
  bindForm();
  window.addEventListener('resize', fitPreview);
  setTimeout(fitPreview, 0);
})();
  </script>
</body>
</html>
